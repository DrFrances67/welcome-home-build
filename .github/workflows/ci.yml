name: CI

on:
  pull_request:

jobs:
  lint-typecheck-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript check
        run: bunx tsc --noEmit

      - name: Run Prettier check
        run: bunx prettier --check .

      - name: Validate state standards datasets
        run: bun run validate:standards


      - name: Run tests
        run: |
          if ! bun run test 2> test-stderr.log; then
            cat test-stderr.log
            exit 1
          fi
